<DOCTYPE html>
  <html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
    <head th:insert="~{fragments/header}"></head>
    <style>
      .custom-checkbox {
        display: inline-block;
        position: relative;
        cursor: pointer;
      }
      .custom-checkbox input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
      }
      .checkmark {
        position: absolute;
        top: 0;
        left: 0;
        height: 20px;
        width: 20px;
        background-color: #fff;
        border: 2px solid #e5e7eb;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      .custom-checkbox input:checked ~ .checkmark {
        background-color: #e94057;
        border-color: #e94057;
      }
      .checkmark:after {
        content: "";
        position: absolute;
        display: none;
      }
      .custom-checkbox input:checked ~ .checkmark:after {
        display: block;
      }
      .custom-checkbox .checkmark:after {
        left: 6px;
        top: 2px;
        width: 5px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .password-toggle {
        cursor: pointer;
        transition: color 0.2s ease;
      }
      .password-toggle:hover {
        color: #ff6b35;
      }
    </style>
    <body class="bg-gray-100">
      <!-- Header -->
      <div th:insert="~{fragments/top :: top}"></div>

      <!-- Content -->
      <main th:fragment="main" class="main container mx-auto p-4 py-8">
        <div class="max-w-md w-full">
          <div class="form-container bg-white rounded-2xl shadow-xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
              <div
                class="w-16 h-16 flex items-center justify-center bg-primary bg-opacity-10 rounded-full mx-auto mb-4"
              >
                <i class="ri-user-line ri-2x text-primary"></i>
              </div>
              <h1 class="text-3xl font-bold text-gray-900 mb-2">
                Bem vindo de volta
              </h1>
              <p class="text-gray-600">
                Faça login na sua conta para continuar sua jornada na dança.
              </p>
            </div>
            <div
              th:if="${error}"
              id="login-error"
              class="error-alert bg-red-50 border border-red-200 rounded-lg p-4 mb-6 transition-opacity duration-500"
            >
              <div class="flex items-center">
                <div
                  class="w-5 h-5 flex items-center justify-center text-red-500 mr-3"
                >
                  <i class="ri-error-warning-line"></i>
                </div>
                <div class="flex-1">
                  <h3 class="text-sm font-medium text-red-800">
                    Falha no login
                  </h3>
                  <p class="text-sm text-red-700 mt-1">
                    Usuário ou senha inválidos. Por favor, tente novamente.
                  </p>
                </div>
              </div>
            </div>
            <!-- Sign In Form -->
            <form
              id="signin-form"
              class="space-y-6"
              th:action="@{/login}"
              method="post"
            >
              <!-- Email/Username Field -->
              <div>
                <label
                  for="username"
                  class="block text-sm font-medium text-gray-700 mb-2"
                  >Email</label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <div
                      class="w-5 h-5 flex items-center justify-center text-gray-400"
                    >
                      <i class="ri-mail-line"></i>
                    </div>
                  </div>
                  <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                    placeholder="Digite seu email"
                  />
                </div>
              </div>
              <!-- Password Field -->
              <div>
                <label
                  for="password"
                  class="block text-sm font-medium text-gray-700 mb-2"
                  >Senha</label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <div
                      class="w-5 h-5 flex items-center justify-center text-gray-400"
                    >
                      <i class="ri-lock-line"></i>
                    </div>
                  </div>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                    placeholder="Digite sua senha"
                  />
                  <button
                    type="button"
                    id="toggle-password"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center"
                  >
                    <div
                      class="w-5 h-5 flex items-center justify-center text-gray-400 password-toggle"
                    >
                      <i class="ri-eye-line" id="password-icon"></i>
                    </div>
                  </button>
                </div>
              </div>
              <!-- Remember Me & Forgot Password -->
              <div class="flex items-center justify-between">
                <label
                  class="custom-checkbox flex items-center text-sm text-gray-600"
                >
                  <input type="checkbox" id="remember" name="remember-me" />
                  <span class="checkmark"></span>
                  <span id="remember-text" class="ml-6 cursor-pointer"
                    >Lembrar de mim</span
                  >
                </label>
                <a
                  href="/login/reset"
                  class="text-sm text-primary hover:text-opacity-80 transition-colors"
                  >Esqueceu a senha?</a
                >
              </div>
              <!-- Sign In Button -->
              <button
                type="submit"
                class="w-full px-4 py-3 bg-primary text-white font-medium hover:bg-opacity-90 transition-colors !rounded-button whitespace-nowrap"
              >
                Logar
              </button>
            </form>
            <!-- Divider
          <div class="mt-8 mb-6">
            <div class="relative">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white text-gray-500"
                  >Or continue with</span
                >
              </div>
            </div>
          </div>
          <!-- Social Login Options
          <div class="space-y-3">
            <button
              type="button"
              class="social-btn w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all"
            >
              <div
                class="w-5 h-5 flex items-center justify-center text-blue-600 mr-3"
              >
                <i class="ri-facebook-fill"></i>
              </div>
              <span class="text-gray-700 font-medium"
                >Continue with Facebook</span
              >
            </button>
            <button
              type="button"
              class="social-btn w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all"
            >
              <div
                class="w-5 h-5 flex items-center justify-center text-red-500 mr-3"
              >
                <i class="ri-google-fill"></i>
              </div>
              <span class="text-gray-700 font-medium"
                >Continue with Google</span
              >
            </button>
            <button
              type="button"
              class="social-btn w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all"
            >
              <div
                class="w-5 h-5 flex items-center justify-center text-pink-600 mr-3"
              >
                <i class="ri-instagram-fill"></i>
              </div>
              <span class="text-gray-700 font-medium"
                >Continue with Instagram</span
              >
            </button>
          </div>
          <!-- Registration Link -->
            <div class="mt-8 text-center">
              <p class="text-gray-600">
                Ainda não tem uma conta?
                <a
                  href="/users/new"
                  class="text-primary font-medium hover:text-opacity-80 transition-colors"
                  >Cadastre-se aqui</a
                >
              </p>
            </div>
          </div>
        </div>
      </main>
      <!-- footer -->
      <div th:insert="~{fragments/footer :: footer}"></div>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          var errorElem = document.getElementById("login-error");
          if (errorElem) {
            setTimeout(function () {
              errorElem.style.opacity = "0";
              setTimeout(function () {
                errorElem.style.display = "none";
              }, 500); // matches duration-500 (500ms)
            }, 5000);
          }
        });
      </script>
      <!-- Password Toggle Script -->
      <script id="password-toggle-script">
        document.addEventListener("DOMContentLoaded", function () {
          const togglePassword = document.getElementById("toggle-password");
          const passwordInput = document.getElementById("password");
          const passwordIcon = document.getElementById("password-icon");
          if (togglePassword && passwordInput && passwordIcon) {
            togglePassword.addEventListener("click", function () {
              const type =
                passwordInput.getAttribute("type") === "password"
                  ? "text"
                  : "password";
              passwordInput.setAttribute("type", type);
              if (type === "password") {
                passwordIcon.className = "ri-eye-line";
              } else {
                passwordIcon.className = "ri-eye-off-line";
              }
            });
          }
        });
      </script>
    </body>
  </html>
</DOCTYPE>
