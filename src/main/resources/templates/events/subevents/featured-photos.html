<div
  th:fragment="featured-photos"
  class="bg-white rounded-md shadow-lg p-6 md:p-8"
>
  <div class="flex items-center justify-center gap-2 mb-6">
    <i class="ri-trophy-fill text-2xl text-yellow-500"></i>
    <h2 class="text-xl md:text-2xl font-bold text-gray-900">
      Fotos mais curtidas
    </h2>
  </div>
  <div class="space-y-4">
    <!-- Empty State -->
    <div
      th:if="${featuredPhotos.size() == 0}"
      class="flex flex-col items-center justify-center py-12 px-4"
    >
      <div class="text-center">
        <div class="mb-4 flex justify-center">
          <i class="ri-heart-line text-4xl md:text-5xl text-gray-300"></i>
        </div>
        <h3 class="text-lg md:text-xl font-semibold text-gray-700 mb-2">
          Nenhuma foto curtida ainda
        </h3>
        <p
          class="text-sm md:text-base text-gray-500 max-w-xs mx-auto leading-relaxed"
        >
          As fotos mais curtidas aparecerão aqui em breve. Comece a curtir e
          deixe sua marca!
        </p>
      </div>
    </div>

    <!-- Top Photo 1 (Gold) -->
    <div class="group" th:if="${featuredPhotos.size() > 0}">
      <div class="relative overflow-hidden rounded-md mb-2">
        <img
          th:src="${featuredPhotos[0].imagePath}"
          class="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-300"
        />
        <div
          class="absolute top-2 right-2 bg-yellow-400 text-gray-900 rounded-full w-10 h-10 flex items-center justify-center font-bold text-lg shadow-lg"
        >
          🥇
        </div>
      </div>
      <div class="flex items-center justify-between px-2">
        <span class="text-sm font-semibold text-gray-700">Primeiro lugar</span>
        <div class="flex items-center gap-1 text-red-500">
          <i class="ri-heart-fill text-sm"></i>
          <span
            th:text="${featuredPhotos[0].count}"
            class="text-sm font-semibold"
          />
        </div>
      </div>
    </div>
    <!-- Top Photo 2 (Silver) -->
    <div class="group" th:if="${featuredPhotos.size() > 1}">
      <div class="relative overflow-hidden rounded-md mb-2">
        <img
          th:src="${featuredPhotos[1].imagePath}"
          alt="Top Photo 2"
          class="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-300"
        />
        <div
          class="absolute top-2 right-2 bg-gray-300 text-gray-900 rounded-full w-10 h-10 flex items-center justify-center font-bold text-lg shadow-lg"
        >
          🥈
        </div>
      </div>
      <div class="flex items-center justify-between px-2">
        <span class="text-sm font-semibold text-gray-700">Segundo lugar</span>
        <div class="flex items-center gap-1 text-red-500">
          <i class="ri-heart-fill text-sm"></i>
          <span
            th:text="${featuredPhotos[1].count}"
            class="text-sm font-semibold"
          />
        </div>
      </div>
    </div>

    <!-- Top Photo 3 (Bronze) -->
    <div class="group" th:if="${featuredPhotos.size() > 2}">
      <div class="relative overflow-hidden rounded-md mb-2">
        <img
          th:src="${featuredPhotos[2].imagePath}"
          alt="Top Photo 3"
          class="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-300"
        />
        <div
          class="absolute top-2 right-2 bg-orange-400 text-gray-900 rounded-full w-10 h-10 flex items-center justify-center font-bold text-lg shadow-lg"
        >
          🥉
        </div>
      </div>
      <div class="flex items-center justify-between px-2">
        <span class="text-sm font-semibold text-gray-700">Terceiro lugar</span>
        <div class="flex items-center gap-1 text-red-500">
          <i class="ri-heart-fill text-sm"></i>
          <span
            th:text="${featuredPhotos[2].count}"
            class="text-sm font-semibold"
          />
        </div>
      </div>
    </div>
  </div>
</div>
