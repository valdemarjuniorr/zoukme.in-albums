<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Confirme seu Cadastro</title>
    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
    <![endif]-->
    <style type="text/css">
      /* Reset */
      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      table,
      td {
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
      img {
        -ms-interpolation-mode: bicubic;
        border: 0;
        outline: none;
        text-decoration: none;
      }
      body {
        margin: 0 !important;
        padding: 0 !important;
        background-color: #f5f5f5;
        width: 100% !important;
      }
      a[x-apple-data-detectors] {
        color: inherit !important;
        text-decoration: none !important;
      }
      #MessageViewBody a {
        color: inherit;
        text-decoration: none;
        font-size: inherit;
        font-family: inherit;
        font-weight: inherit;
        line-height: inherit;
      }

      /* Typography */
      .t {
        font-family: Arial, sans-serif;
      }
      .t-h1 {
        font-family: Arial, sans-serif;
        font-size: 32px;
        color: #ffffff;
        margin: 0;
        font-weight: bold;
      }
      .t-h2 {
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        color: #333333;
        margin: 0 0 8px 0;
      }
      .t-h3 {
        font-family: Arial, sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: #333333;
        text-align: center;
        margin: 0 0 20px 0;
      }
      .t-h4 {
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #92400e;
        margin: 0 0 4px 0;
      }
      .t-body {
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: #666666;
        line-height: 1.7;
      }
      .t-small {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #666666;
        line-height: 1.6;
      }
      .t-warning {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #92400e;
        line-height: 1.6;
      }
      .t-info {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #1e40af;
        line-height: 1.6;
      }
      .t-footer {
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #777777;
        line-height: 1.5;
      }
      .t-footer-link {
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #999999;
        text-decoration: none;
        margin: 0 16px;
      }
      .t-link {
        font-family: Arial, sans-serif;
        color: #8a2be2;
        text-decoration: underline;
        font-size: 14px;
        word-break: break-all;
      }

      /* Layout */
      .wrapper {
        background-color: #f5f5f5;
      }
      .email-container {
        max-width: 600px;
        background-color: #ffffff;
      }
      .section-header {
        background: linear-gradient(135deg, #e94057 0%, #8a2be2 100%);
        padding: 40px 30px;
        text-align: center;
      }
      .section-welcome {
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #e5e5e5;
      }
      .section-body {
        padding: 30px;
      }
      .section-footer {
        background-color: #f8f9fa;
        padding: 30px;
        border-top: 1px solid #e5e5e5;
      }

      /* Components */
      .box-info {
        background-color: #f0f8ff;
        border-left: 4px solid #3b82f6;
        padding: 16px;
      }
      .box-warning {
        background-color: #fffbf0;
        border: 1px solid #fde68a;
        border-radius: 8px;
        padding: 16px;
      }
      .box-alt-link {
        background-color: #f8f9fa;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
      }
      .cta-button {
        display: inline-block;
        background-color: #e94057;
        color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 16px;
        font-weight: bold;
        text-decoration: none;
        padding: 16px 32px;
        border-radius: 8px;
        mso-hide: all;
      }
      .social-icon {
        display: inline-block;
        width: 32px;
        height: 32px;
        background-color: #e5e5e5;
        color: #666666;
        border-radius: 50%;
        text-decoration: none;
        margin: 0 8px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        line-height: 32px;
        text-align: center;
      }

      /* Responsive */
      @media only screen and (max-width: 600px) {
        .email-container {
          width: 100% !important;
        }
        .fluid {
          max-width: 100% !important;
          height: auto !important;
        }
        .section-header,
        .section-welcome,
        .section-body,
        .section-footer {
          padding: 20px !important;
        }
        .cta-button {
          padding: 14px 24px !important;
          font-size: 16px !important;
        }
        .t-footer-link {
          display: block !important;
          margin: 8px 0 !important;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      word-spacing: normal;
    "
  >
    <!-- Email wrapper -->
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
      class="wrapper"
      style="background-color: #f5f5f5"
    >
      <tr>
        <td align="center" style="padding: 20px 10px">

          <table role="presentation" align="center" border="0" cellspacing="0" cellpadding="0" width="600">
          <tr>
          <td>
          <![endif]-->

          <!-- Email container -->
          <table
            role="presentation"
            class="email-container"
            cellspacing="0"
            cellpadding="0"
            border="0"
            width="600"
            style="max-width: 600px; background-color: #ffffff"
          >
            <!-- Header -->
            <tr>
              <td
                class="section-header"
                style="
                  background: linear-gradient(135deg, #e94057 0%, #8a2be2 100%);
                  padding: 40px 30px;
                  text-align: center;
                "
              >

                <table role="presentation" border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td bgcolor="#e94057" align="center" style="padding: 40px 30px;">

                <h1
                  class="t-h1"
                  style="
                    font-family: Arial, sans-serif;
                    font-size: 32px;
                    color: #ffffff;
                    margin: 0;
                    font-weight: bold;
                  "
                >
                  Zoukme In
                </h1>
                <!--[if mso]>
                </td></tr></table>
                <![endif]-->
              </td>
            </tr>

            <!-- Main content -->
            <tr>
              <td class="section-body" style="padding: 30px"></td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                class="section-footer"
                style="
                  background-color: #f8f9fa;
                  padding: 30px;
                  border-top: 1px solid #e5e5e5;
                "
              >
                <!-- Social links -->
                <table
                  role="presentation"
                  cellspacing="0"
                  cellpadding="0"
                  border="0"
                  width="100%"
                  style="margin-bottom: 20px"
                >
                  <tr>
                    <td align="center">
                      <a
                        href="https://instagram.com/zoukme.in"
                        target="_blank"
                        class="social-icon"
                        style="
                          display: inline-block;
                          width: 32px;
                          height: 32px;
                          background-color: #e5e5e5;
                          color: #666666;
                          border-radius: 50%;
                          text-decoration: none;
                          margin: 0 8px;
                          font-family: Arial, sans-serif;
                          font-size: 14px;
                          font-weight: bold;
                          line-height: 32px;
                          text-align: center;
                        "
                      >
                        <img
                          th:src="@{/svg/instagram.svg}"
                          alt="Instagram"
                          width="32"
                          height="32"
                        />
                      </a>
                      <a
                        href="https://www.youtube.com/@zoukmein"
                        target="_blank"
                        class="social-icon"
                        style="
                          display: inline-block;
                          width: 32px;
                          height: 32px;
                          background-color: #e5e5e5;
                          color: #666666;
                          border-radius: 50%;
                          text-decoration: none;
                          margin: 0 8px;
                          font-family: Arial, sans-serif;
                          font-size: 14px;
                          font-weight: bold;
                          line-height: 32px;
                          text-align: center;
                        "
                      >
                        <img
                          th:src="@{/svg/youtube.svg}"
                          alt="Instagram"
                          width="32"
                          height="32"
                        />
                      </a>
                    </td>
                  </tr>
                </table>

                <!-- Company info -->
                <table
                  role="presentation"
                  cellspacing="0"
                  cellpadding="0"
                  border="0"
                  width="100%"
                >
                  <tr>
                    <td align="center">
                      <p
                        class="t-footer"
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 12px;
                          font-weight: bold;
                          color: #777777;
                          margin: 0 0 8px 0;
                        "
                      >
                        <a href="https://zoukme.in" target="_blank"
                          >Zoukme In</a
                        >
                      </p>
                      <p
                        class="t-footer"
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 12px;
                          color: #777777;
                          margin: 0 0 16px 0;
                          line-height: 1.5;
                        "
                      >
                        Telefone: (47) 9-8859-4002 | E-mail: contato@zoukme.in
                      </p>
                      <p style="margin: 0 0 16px 0">
                        <a
                          href="#"
                          class="t-footer-link"
                          style="
                            font-family: Arial, sans-serif;
                            font-size: 12px;
                            color: #999999;
                            text-decoration: none;
                            margin: 0 16px;
                          "
                          >Política de Privacidade</a
                        >
                        <a
                          href="#"
                          class="t-footer-link"
                          style="
                            font-family: Arial, sans-serif;
                            font-size: 12px;
                            color: #999999;
                            text-decoration: none;
                            margin: 0 16px;
                          "
                          >Termos de Uso</a
                        >
                        <a
                          href="#"
                          class="t-footer-link"
                          style="
                            font-family: Arial, sans-serif;
                            font-size: 12px;
                            color: #999999;
                            text-decoration: none;
                            margin: 0 16px;
                          "
                          >Descadastrar</a
                        >
                      </p>
                      <p
                        class="t-footer"
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 12px;
                          color: #777777;
                          margin: 0;
                        "
                      >
                        &copy;
                        <span
                          th:text="${#dates.format(#dates.createNow(), 'yyyy')}"
                        />
                        Zoukme In. All rights reserved.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!--[if mso]>
          </td>
          </tr>
          </table>
          <![endif]-->
        </td>
      </tr>
    </table>
  </body>
</html>
