<div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
    <div class="bg-white rounded-lg shadow-sm p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-gray-500">Finalizados</p>
          <h3 class="text-2xl font-bold text-gray-900 mt-1">
            R$
            <span
              th:text="${#numbers.formatDecimal(totalCompleted.sumPrice(), 1, 2, 'COMMA')}"
            ></span>
          </h3>
        </div>
        <div
          class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center"
        >
          <div class="w-6 h-6 flex items-center justify-center text-green-500">
            <i class="ri-checkbox-circle-line"></i>
          </div>
        </div>
      </div>
      <div class="mt-4 flex items-center text-sm">
        <span class="text-green-500"
          ><span th:text="${totalCompleted.total}"></span> Transações
          finalizadas</span
        >
      </div>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-gray-500">Pendentes</p>
          <h3
            th:text="${#numbers.formatDecimal(totalPending.sumPrice, 1, 2, 'COMMA')}"
            class="text-2xl font-bold text-gray-900 mt-1"
          ></h3>
        </div>
        <div
          class="w-12 h-12 rounded-full bg-yellow-50 flex items-center justify-center"
        >
          <div class="w-6 h-6 flex items-center justify-center text-yellow-500">
            <i class="ri-time-line"></i>
          </div>
        </div>
      </div>
      <div class="mt-4 flex items-center text-sm">
        <span class="text-yellow-500"
          ><span th:text="${totalPending.total}"></span> Pendentes</span
        >
      </div>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-gray-500">Expirados</p>
          <h3 class="text-2xl font-bold text-gray-900 mt-1">
            R$
            <span
              th:text="${#numbers.formatDecimal(totalExpired.sumPrice, 1, 2, 'COMMA')}"
            ></span>
          </h3>
        </div>
        <div
          class="w-12 h-12 rounded-full bg-[#fef2f3] flex items-center justify-center"
        >
          <div class="w-6 h-6 flex items-center justify-center text-primary">
            <i class="ri-money-dollar-circle-line"></i>
          </div>
        </div>
      </div>
      <div class="mt-4 flex items-center text-sm">
        <span class="text-red-500"
          ><span th:text="${totalExpired.total}" /> Expirados</span
        >
      </div>
    </div>
  </div>
  <div
    class="mb-6 md:mb-8 flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3"
  >
    <div class="relative">
      <select
        name="status"
        hx-target="#main-table"
        hx-swap="innerHTML"
        th:hx-get="@{/admin/payments}"
        hx-include="[name='eventId']"
        hx-trigger="change"
        class="appearance-none bg-gray-50 border border-gray-300 text-gray-700 py-2 pl-3 pr-8 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      >
        <option value="">Todos os status</option>
        <option
          th:each="status : ${paymentsStatus}"
          th:text="${status.status}"
          th:value="${status}"
        ></option>
      </select>
      <div
        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"
      >
        <div class="w-4 h-4 flex items-center justify-center">
          <i class="ri-arrow-down-s-line"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="bg-white rounded-lg shadow-sm">
    <div id="main-table" class="overflow-x-auto">
      <div th:insert="~{admin/dashboard/payments/table-response}"></div>
    </div>
    <!-- render the payment details modal -->
    <div id="payment-details-modal"></div>
  </div>
</div>
