<div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
  <h2 class="text-lg font-medium text-gray-900">Gerenciamento de Usuários</h2>
  <div
    class="mt-4 md:mt-0 flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3"
  >
    <div class="relative">
      <select
        class="appearance-none bg-gray-50 border border-gray-300 text-gray-700 py-2 pl-3 pr-8 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary"
      >
        <option>Ordenar por: Mais Recentes</option>
        <option>Ordenar por: Mais Antigos</option>
        <option>Ordenar por: Nome A-Z</option>
        <option>Ordenar por: Nome Z-A</option>
      </select>
      <div
        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"
      >
        <div class="w-4 h-4 flex items-center justify-center">
          <i class="ri-arrow-down-s-line"></i>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Events table -->
<div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-[#fef2f3]">
      <tr>
        <th
          scope="col"
          class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
        >
          <div class="flex items-center">Nome</div>
        </th>
        <th
          scope="col"
          class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
        >
          Celular
        </th>
        <th
          scope="col"
          class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
        >
          Instagram
        </th>
        <th
          scope="col"
          class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider"
        >
          Ações
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr th:each="user : ${users}" class="hover:bg-gray-50">
        <td class="px-6 py-4 whitespace-nowrap">
          <div class="flex items-center">
            <div
              th:text="${user.fullName}"
              class="text-sm font-medium text-gray-900"
            ></div>
          </div>
        </td>
        <td class="px-6 py-4 whitespace-nowrap">
          <span
            th:text="${'(' + #strings.substring(user.phone,0,2)} + ') ' + ${#strings.substring(user.phone,2,6)} + '-' + ${#strings.substring(user.phone,6,10)}"
            class="whitespace-nowrap text-sm text-gray-500"
          >
          </span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
          <a
            th:text="${user.instagram}"
            th:href="'https://www.instagram.com/' + ${user.instagram}"
            target="_blank"
            class="text-primary hover:underline"
          />
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
          <div class="flex justify-end space-x-2">
            <a class="text-gray-500 hover:text-primary">
              <div
                title="Editar"
                class="w-5 h-5 flex items-center justify-center"
              >
                <i class="ri-edit-line disabled"></i>
              </div>
            </a>
            <button
              th:hx-delete="@{/admin/users/{userId}(userId=${user.id})}"
              class="text-gray-500 hover:text-primary"
              hx-confirm="Deseja remover esse usuário?"
              hx-target="#toast"
            >
              <div
                title="Excluir"
                class="w-5 h-5 flex items-center justify-center"
              >
                <i class="ri-delete-bin-fill"></i>
              </div>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
  <div>
    <p class="text-sm text-gray-700">
      Mostrando
      <span th:text="${users.number + 1}" class="font-medium"></span>
      de
      <span th:text="${users.totalPages}" class="font-medium"></span>
      de
      <span th:text="${users.totalElements}" class="font-medium"></span>
      resultados
    </p>
  </div>
  <!-- pagination -->
  <div>
    <nav
      class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px"
      aria-label="Pagination"
    >
      <a
        th:if="${!users.first}"
        th:hx-get="@{/admin/events?page={page}(page=${users.number})}"
        hx-target="#main-table-content"
        class="cursor-pointer relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
      >
        <span class="sr-only">Anterior</span>
        <div class="w-5 h-5 flex items-center justify-center">
          <i class="ri-arrow-left-s-line"></i>
        </div>
      </a>
      <a
        th:each="page : ${pagination}"
        th:text="${page}"
        th:hx-get="@{/admin/events?page={page}(page=${page})}"
        hx-target="#main-table-content"
        th:class="${page == users.number + 1 + ''
							? 'z-10 bg-primary border-primary text-white relative inline-flex items-center px-4 py-2 border text-sm font-medium'
							: 'cursor-pointer bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium'}"
      >
      </a>
      <a
        th:if="${!users.last}"
        th:hx-get="@{/admin/events?page={page}(page=${users.number + 2})}"
        hx-target="#main-table-content"
        class="cursor-pointer relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
      >
        <span class="sr-only">Próximo</span>
        <div class="w-5 h-5 flex items-center justify-center">
          <i class="ri-arrow-right-s-line"></i>
        </div>
      </a>
    </nav>
  </div>
</div>
