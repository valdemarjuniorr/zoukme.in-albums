<!doctype html>
<html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
  <head th:insert="~{fragments/header}"></head>

  <body class="bg-gray-100">
    <!-- Header -->
    <div th:insert="~{fragments/top :: top}"></div>

    <!-- Content -->
    <main
      th:fragment="main"
      class="container mx-auto pt-10 pb-10 font-['Montserrat']"
    >
      <form
        th:action="@{/admin/albums/{albumId}(albumId=${album.id})}"
        th:method="PUT"
      >
        <input type="hidden" name="id" th:value="${album.id}" />
        <div class="bg-white rounded-lg shadow-sm overflow-hidden mb-8">
          <div class="p-6 border-b border-gray-200">
            <h2 class="text-lg font-medium text-gray-900">
              Informações do Álbum
            </h2>
            <p class="mt-1 text-sm text-gray-500">
              Forneça as informações necessárias para atualizar o álbum de
              fotos.
            </p>
          </div>
          <!-- Cover photo upload section -->
          <div class="p-6 border-b border-gray-200">
            <span class="block text-sm font-medium text-gray-700 mb-2"
              >Foto da capa
            </span>
            <div
              class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg overflow-hidden"
            >
              <img
                th:src="${album.thumbUrl}"
                class="max-w-full max-h-48 object-contain rounded-md mb-4"
              />
            </div>
          </div>
          <!-- Album details form -->
          <div class="p-6">
            <div class="space-y-6">
              <div>
                <label
                  for="album-title"
                  class="block text-sm font-medium text-gray-700"
                >
                  Título <span class="text-red-500">*</span>
                </label>
                <div class="mt-1">
                  <input
                    type="text"
                    id="album-title"
                    name="title"
                    placeholder="Baile Zoukme In 2026"
                    th:value="${album?.title}"
                    class="block w-full border-gray-300 border rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                    required
                  />
                  <p class="mt-1 text-xs text-gray-500">
                    A URL será o titulo do evento separado por hifens ao inves
                    de espacos. Por exemplo:
                    zoukme.in/events/corporate-retreat-2025/albums
                  </p>
                </div>
                <div
                  id="title-error"
                  class="hidden mt-1 text-sm text-red-600"
                ></div>
              </div>
              <div>
                <label
                  for="album-description"
                  class="block text-sm font-medium text-gray-700"
                >
                  Descrição
                </label>
                <div class="mt-1">
                  <textarea
                    id="album-description"
                    name="description"
                    rows="4"
                    placeholder="Descrição do álbum"
                    class="block w-full border-gray-300 border rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                  ></textarea>
                </div>
              </div>
              <div>
                <label
                  for="album-location"
                  class="block text-sm font-medium text-gray-700"
                >
                  Cidade/Estado <span class="text-red-500">*</span>
                </label>
                <div class="mt-1">
                  <input
                    type="text"
                    id="album-location"
                    name="city"
                    placeholder="Joinville/SC"
                    th:value="${album?.city}"
                    class="block w-full border-gray-300 border rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                  />
                </div>
              </div>
              <div>
                <label
                  for="date"
                  class="block text-sm font-medium text-gray-700"
                >
                  Data do Álbum <span class="text-red-500">*</span>
                </label>
                <div class="mt-1 relative rounded-md shadow-sm">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <div
                      class="w-5 h-5 flex items-center justify-center text-gray-400"
                    >
                      <i class="ri-calendar-line"></i>
                    </div>
                  </div>
                  <input
                    type="date"
                    id="date"
                    name="eventDate"
                    th:value="${album?.eventDate}"
                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                  />
                </div>
              </div>
            </div>
            <!-- Action buttons -->
            <div class="mt-8 flex items-center justify-end space-x-4">
              <a
                href="/admin/home"
                data-readdy="true"
                class="text-gray-700 px-4 py-2 rounded-button text-sm font-medium border border-gray-300 hover:bg-gray-50 whitespace-nowrap"
              >
                Cancelar
              </a>
              <button
                type="submit"
                class="bg-primary hover:opacity-90 transition text-white px-6 py-2 rounded-button text-sm font-medium whitespace-nowrap"
              >
                Atualizar
              </button>
            </div>
          </div>
        </div>
      </form>
    </main>
    <!-- footer -->
    <div th:insert="~{fragments/footer :: footer}"></div>
  </body>
</html>
