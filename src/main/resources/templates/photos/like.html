<div th:fragment="like(photoId, liked, count)">
  <style>
    @keyframes likePopup {
      0% {
        transform: scale(1);
      }
      40% {
        transform: scale(1.4);
      }
      70% {
        transform: scale(0.9);
      }
      100% {
        transform: scale(1);
      }
    }
    .like-pop {
      animation: likePopup 0.35s ease forwards;
    }
  </style>
  <!-- Unauthenticated state -->
  <button
    sec:authorize="!isAuthenticated()"
    class="heart-unauth flex items-center justify-center gap-1 px-2 py-1.5 text-xs font-medium text-gray-600 bg-transparent border-none cursor-pointer transition-all duration-200 ease-in-out active:scale-95 hover:text-gray-700"
    title="Login necessário"
    onclick="showLoginRequired(this); return false;"
  >
    <i
      class="ri-heart-line text-xs flex items-center justify-center transition-transform duration-200 ease-in-out hover:scale-110"
    ></i>
    <span th:text="${count}"></span>
  </button>
  <script>
    function showLoginRequired(btn) {
      btn.classList.remove(
        "heart-unauth",
        "text-gray-600",
        "hover:text-gray-700",
      );
      btn.classList.add("heart-liked", "text-red-500", "hover:text-red-600");
      btn
        .querySelector("i")
        .classList.replace("ri-heart-line", "ri-heart-fill");
      const span = btn.querySelector("span");
      span.textContent = "Login necessário";
    }
  </script>
  <!-- Authenticated state -->
  <div sec:authorize="isAuthenticated()">
    <!-- Unliked -->
    <button
      th:if="${!liked}"
      class="heart-unliked flex items-center justify-center gap-1 px-2 py-1.5 text-xs font-medium text-gray-600 bg-transparent border-none cursor-pointer transition-all duration-200 ease-in-out active:scale-95 hover:text-gray-700"
      th:hx-post="@{/photos/{photoId}/like(photoId=${photoId})}"
      hx-trigger="click"
      hx-swap="outerHTML"
      onclick="this.querySelector('.ri-heart-line')?.classList.add('like-pop')"
    >
      <i
        class="ri-heart-line text-xs flex items-center justify-center transition-transform duration-200 ease-in-out hover:scale-110"
      ></i>
      <span th:text="${count}"></span>
    </button>
    <!-- Liked -->
    <button
      th:if="${liked}"
      class="heart-liked flex items-center justify-center gap-1 px-2 py-1.5 text-xs font-medium text-red-500 bg-transparent border-none cursor-pointer transition-all duration-200 ease-in-out active:scale-95 hover:text-red-600"
      th:hx-post="@{/photos/{photoId}/dislike(photoId=${photoId})}"
      hx-trigger="click"
      hx-swap="outerHTML"
      onclick="this.querySelector('.ri-heart-fill')?.classList.add('like-pop')"
    >
      <i
        class="ri-heart-fill text-xs flex items-center justify-center transition-transform duration-200 ease-in-out hover:scale-110"
      ></i>
      <span th:text="${count}"></span>
    </button>
  </div>
</div>
