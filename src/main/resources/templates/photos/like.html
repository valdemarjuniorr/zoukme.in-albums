<div th:fragment="like(photoId, liked, count)">
  <div
    sec:authorize="!isAuthenticated()"
    class="absolute bottom-1 left-1 flex items-center space-x-2 z-1"
  >
    <button
      class="like-btn flex items-center space-x-2 bg-white/95 hover:bg-white backdrop-blur-sm rounded-full px-2 py-1 transition-all duration-200 cursor-pointer group shadow-lg border border-gray-200"
      title="Login necessário"
      onclick="
        showLoginRequired(this);
        return false;
      "
    >
      <div class="w-3 h-3 flex items-center justify-center icon-container">
        <i class="ri-heart-line text-gray-400 text-base"></i>
      </div>
      <span
        class="text-red-400 text-xs font-medium select-none text-container hidden"
      ></span>
    </button>
    <script>
      function showLoginRequired(btn) {
        btn.querySelector(".icon-container").innerHTML =
          '<i class="ri-heart-line text-red-400 text-base"></i>';
        const label = btn.querySelector(".text-container");
        label.textContent = "Login necessário";
        label.classList.remove("hidden");
      }
    </script>
  </div>
  <div sec:authorize="isAuthenticated()">
    <div
      th:if="${!liked}"
      th:hx-post="@{/photos/{photoId}/like(photoId=${photoId})}"
      hx-trigger="click"
      hx-swap="outerHTML"
      class="absolute bottom-1 left-1 flex items-center space-x-2 z-1"
    >
      <button
        class="like-btn flex items-center space-x-2 bg-white/95 hover:bg-white backdrop-blur-sm rounded-full px-2 py-1 transition-all duration-200 cursor-pointer group shadow-lg border border-gray-200"
      >
        <div class="w-3 h-3 flex items-center justify-center">
          <i
            class="ri-heart-line text-gray-700 text-base transition-transform duration-200 group-hover:scale-110"
          ></i>
        </div>
        <span th:text="${count}" class="text-xs font-medium select-none"></span>
      </button>
    </div>
    <div
      th:if="${liked}"
      th:hx-post="@{/photos/{photoId}/dislike(photoId=${photoId})}"
      hx-trigger="click"
      hx-swap="outerHTML"
      class="absolute bottom-1 left-1 flex items-center space-x-2 z-1"
    >
      <button
        class="like-btn flex items-center space-x-2 backdrop-blur-sm rounded-full px-2 py-1 transition-all duration-200 cursor-pointer group shadow-lg border bg-red-50 hover:bg-red-100 border-red-200"
      >
        <div class="w-3 h-3 flex items-center justify-center">
          <i
            class="text-base transition-transform duration-200 group-hover:scale-110 ri-heart-fill text-red-500"
          ></i>
        </div>
        <span
          th:text="${count}"
          class="text-red-500 text-xs font-medium select-none"
        ></span>
      </button>
    </div>
  </div>
</div>
