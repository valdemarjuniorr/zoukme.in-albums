<DOCTYPE html>
  <html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
    <head th:insert="~{fragments/header}"></head>

    <body class="bg-gray-100">
      <!-- Header -->
      <div th:insert="~{fragments/top :: top}"></div>

      <!-- Content -->
      <main th:fragment="main" class="main container mx-auto p-4 py-8">
        <div
          class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 sm:p-8 lg:p-12 max-w-md w-full text-center"
        >
          <div
            class="w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center bg-green-100 rounded-full mx-auto mb-6 sm:mb-8"
          >
            <div
              class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center"
            >
              <i class="ri-check-line text-2xl sm:text-3xl text-green-600"></i>
            </div>
          </div>
          <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-3 sm:mb-4">
            Bem-vindo!
          </h2>
          <p class="text-base sm:text-lg text-gray-600 mb-4 sm:mb-6">
            Cadastro Concluído
          </p>
          <p
            class="text-sm sm:text-base text-gray-600 mb-6 sm:mb-8 leading-relaxed"
          >
            Agora você pode acessar todas as vantagens da sua conta! Desfrute de
            recursos premium, conteúdo personalizado, ofertas exclusivas e uma
            experiência de usuário perfeita feita especialmente para você.
          </p>
          <a
            href="/"
            title="Ir para Página Inicial"
            class="w-full bg-primary hover:bg-red-600 text-white font-medium py-2.5 sm:py-3 px-4 sm:px-6 !rounded-button transition-colors whitespace-nowrap text-sm sm:text-base flex items-center justify-center"
          >
            <div
              class="w-4 h-4 sm:w-5 sm:h-5 flex items-center justify-center mr-2"
            >
              <i class="ri-home-line"></i>
            </div>
            Ir para Página Inicial
          </a>
        </div>
      </main>

      <!-- footer -->
      <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
  </html>
</DOCTYPE>
