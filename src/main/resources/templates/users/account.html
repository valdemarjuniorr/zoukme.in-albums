<DOCTYPE html>
  <html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
    <head th:insert="~{fragments/header}"></head>

    <body class="bg-gray-100">
      <!-- Header -->
      <div th:insert="~{fragments/top :: top}"></div>

      <!-- Content -->
      <main th:fragment="main" class="main container mx-auto p-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8">
          <h1 class="text-2xl font-bold text-gray-800 mb-2">
            Informações Pessoais
          </h1>
          <p class="text-gray-600 mb-8">
            Mantenha suas informações de perfil atualizadas para melhorar sua
            experiência
          </p>
          <div
            th:if="${success}"
            id="success-message"
            class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg"
          >
            <div class="flex items-center">
              <div class="w-5 h-5 flex items-center justify-center mr-3">
                <i class="ri-check-line text-green-600"></i>
              </div>
              <p class="text-green-800 text-sm">
                Suas informações foram atualizadas com sucesso!
              </p>
            </div>
          </div>
          <div
            id="error-message"
            class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg"
          >
            <div class="flex items-center">
              <div class="w-5 h-5 flex items-center justify-center mr-3">
                <i class="ri-error-warning-line text-red-600"></i>
              </div>
              <p class="text-red-800 font-medium" id="error-text">
                Verifique o formulário em busca de erros
              </p>
            </div>
          </div>
          <form id="update-form" class="space-y-6">
            <input type="hidden" name="userId" th:value="${user.userId.id}" />
            <input type="hidden" name="id" th:value="${user.id}" />
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label
                  class="flex items-center text-sm font-medium text-gray-700 mb-2"
                >
                  <div class="w-4 h-4 flex items-center justify-center mr-2">
                    <i class="ri-user-line text-gray-500"></i>
                  </div>
                  Primeiro Nome *
                </label>
                <input
                  type="text"
                  id="firstName"
                  name="firstName"
                  th:value="${user.firstName}"
                  placeholder="Digite seu primeiro nome"
                  class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                  required
                />
                <div
                  class="error-message hidden mt-1 text-xs text-red-600"
                ></div>
              </div>
              <div>
                <label
                  class="flex items-center text-sm font-medium text-gray-700 mb-2"
                >
                  <div class="w-4 h-4 flex items-center justify-center mr-2">
                    <i class="ri-user-line text-gray-500"></i>
                  </div>
                  Sobrenome *
                </label>
                <input
                  type="text"
                  id="lastName"
                  th:value="${user.surname}"
                  name="lastName"
                  placeholder="Digite seu sobrenome"
                  class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                  required
                />
                <div
                  class="error-message hidden mt-1 text-xs text-red-600"
                ></div>
              </div>
            </div>
            <div>
              <label
                class="flex items-center text-sm font-medium text-gray-700 mb-2"
              >
                <div class="w-4 h-4 flex items-center justify-center mr-2">
                  <i class="ri-mail-line text-gray-500"></i>
                </div>
                E-mail *
              </label>
              <input
                type="email"
                id="email"
                name="email"
                th:value="${email}"
                placeholder="Digite seu endereço de e-mail"
                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                required
                disabled
              />
              <div class="error-message hidden mt-1 text-xs text-red-600"></div>
            </div>
            <div>
              <label
                class="flex items-center text-sm font-medium text-gray-700 mb-2"
              >
                <div class="w-4 h-4 flex items-center justify-center mr-2">
                  <i class="ri-phone-line text-gray-500"></i>
                </div>
                Número de Telefone
              </label>
              <input
                type="tel"
                id="phone"
                name="phone"
                th:value="${user.phone}"
                placeholder="(11) 99999-9999"
                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
              />
              <script type="text/javascript">
                var cleave = new Cleave("#phone", {
                  blocks: [0, 2, 5, 4],
                  delimiters: ["(", ") ", " - "],
                  numeral: false,
                });
              </script>
              <div class="error-message hidden mt-1 text-xs text-red-600"></div>
            </div>
            <div>
              <label
                class="flex items-center text-sm font-medium text-gray-700 mb-2"
              >
                <div class="w-4 h-4 flex items-center justify-center mr-2">
                  <i class="ri-instagram-line text-gray-500"></i>
                </div>
                Instagram
              </label>
              <div class="relative">
                <span
                  class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"
                  >@</span
                >
                <input
                  type="text"
                  id="instagram"
                  name="instagram"
                  th:value="${user.instagram}"
                  placeholder="seu_usuario"
                  class="w-full pl-8 pr-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                />
              </div>
              <div class="error-message hidden mt-1 text-xs text-red-600"></div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 pt-6">
              <button
                hx-disabled-elt="self"
                th:hx-post="@{/users/account}"
                hx-target="#toast"
                type="submit"
                class="px-8 py-3 bg-primary text-white hover:bg-opacity-90 transition-colors !rounded-button whitespace-nowrap"
              >
                Atualizar Informações
              </button>
            </div>
          </form>
          <div class="pt-6 border-t border-gray-200">
            <form id="update-password-form" class="space-y-6">
              <h3 class="text-lg font-semibold text-gray-800 mb-4">
                Alterar Senha
              </h3>
              <div class="space-y-4">
                <div>
                  <label
                    class="flex items-center text-sm font-medium text-gray-700 mb-2"
                  >
                    <div class="w-4 h-4 flex items-center justify-center mr-2">
                      <i class="ri-lock-line text-gray-500"></i>
                    </div>
                    Nova Senha *
                  </label>
                  <div class="relative">
                    <input
                      type="password"
                      id="newPassword"
                      name="newPassword"
                      placeholder="Digite sua nova senha"
                      class="w-full px-4 py-3 pr-12 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                      required
                    />
                    <button
                      type="button"
                      class="absolute right-3 top-1/2 transform -translate-y-1/2 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-600"
                      onclick="togglePassword('newPassword')"
                    >
                      <i class="ri-eye-line"></i>
                    </button>
                  </div>
                  <div class="mt-2">
                    <div class="flex items-center space-x-2 text-xs">
                      <div class="flex-1 bg-gray-200 rounded-full h-1">
                        <div
                          id="password-strength"
                          class="h-1 rounded-full transition-all duration-300 bg-gray-200"
                        ></div>
                      </div>
                      <span id="password-strength-text" class="text-gray-500"
                        >Fraca</span
                      >
                    </div>
                  </div>
                  <div
                    class="error-message hidden mt-1 text-xs text-red-600"
                  ></div>
                </div>
                <div>
                  <label
                    class="flex items-center text-sm font-medium text-gray-700 mb-2"
                  >
                    <div class="w-4 h-4 flex items-center justify-center mr-2">
                      <i class="ri-lock-line text-gray-500"></i>
                    </div>
                    Confirmar Nova Senha *
                  </label>
                  <div class="relative">
                    <input
                      type="password"
                      id="confirmPassword"
                      name="confirmNewPassword"
                      placeholder="Confirme sua nova senha"
                      class="w-full px-4 py-3 pr-12 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                      required
                    />
                    <button
                      type="button"
                      class="absolute right-3 top-1/2 transform -translate-y-1/2 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-600"
                      onclick="togglePassword('confirmPassword')"
                    >
                      <i class="ri-eye-line"></i>
                    </button>
                  </div>
                  <div
                    class="error-message hidden mt-1 text-xs text-red-600"
                  ></div>
                </div>
              </div>
              <div class="flex flex-col sm:flex-row gap-4 pt-6">
                <button
                  id="update-password-button"
                  hx-disabled-elt="#update-password-button"
                  th:hx-post="@{/users/account/password}"
                  hx-target="#toast"
                  type="submit"
                  class="px-8 py-3 bg-primary text-white hover:bg-opacity-90 transition-colors !rounded-button whitespace-nowrap"
                >
                  Atualizar Senha
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
      <script id="password-functionality">
        function togglePassword(fieldId) {
          const field = document.getElementById(fieldId);
          const button = field.nextElementSibling;
          const icon = button.querySelector("i");
          if (field.type === "password") {
            field.type = "text";
            icon.className = "ri-eye-off-line";
          } else {
            field.type = "password";
            icon.className = "ri-eye-line";
          }
        }
        document.addEventListener("DOMContentLoaded", function () {
          const newPasswordField = document.getElementById("newPassword");
          const strengthBar = document.getElementById("password-strength");
          const strengthText = document.getElementById(
            "password-strength-text",
          );
          newPasswordField.addEventListener("input", function () {
            const password = this.value;
            const strength = calculatePasswordStrength(password);
            updatePasswordStrength(strength);
          });
          function calculatePasswordStrength(password) {
            if (!password) return 0;
            let score = 0;
            if (password.length >= 8) score += 25;
            if (/[a-z]/.test(password)) score += 25;
            if (/[A-Z]/.test(password)) score += 25;
            if (/[0-9]/.test(password)) score += 25;
            if (/[^A-Za-z0-9]/.test(password)) score += 25;
            return Math.min(score, 100);
          }
          function updatePasswordStrength(strength) {
            strengthBar.style.width = strength + "%";
            if (strength < 25) {
              strengthBar.className =
                "h-1 rounded-full transition-all duration-300 bg-red-500";
              strengthText.textContent = "Fraca";
              strengthText.className = "text-red-500";
            } else if (strength < 50) {
              strengthBar.className =
                "h-1 rounded-full transition-all duration-300 bg-yellow-500";
              strengthText.textContent = "Razoável";
              strengthText.className = "text-yellow-500";
            } else if (strength < 75) {
              strengthBar.className =
                "h-1 rounded-full transition-all duration-300 bg-blue-500";
              strengthText.textContent = "Boa";
              strengthText.className = "text-blue-500";
            } else {
              strengthBar.className =
                "h-1 rounded-full transition-all duration-300 bg-green-500";
              strengthText.textContent = "Forte";
              strengthText.className = "text-green-500";
            }
          }
        });
      </script>

      <!-- footer -->
      <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
  </html>
</DOCTYPE>
