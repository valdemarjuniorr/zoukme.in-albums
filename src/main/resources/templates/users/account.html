<DOCTYPE html>
  <html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
    <head th:insert="~{fragments/header}"></head>

    <body class="bg-gray-100">
      <!-- Header -->
      <div th:insert="~{fragments/top :: top}"></div>

      <!-- Content -->
      <main th:fragment="main" class="main container mx-auto p-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8">
          <!-- Tabs Navigation -->
          <div class="border-b border-gray-200 mb-8">
            <div class="flex gap-1 sm:gap-0 -mb-px">
              <button
                id="tab-personal"
                class="tab-button px-2 sm:px-6 py-3 font-medium text-gray-700 border-b-2 border-transparent hover:text-primary hover:border-gray-300 transition-colors active whitespace-nowrap text-sm sm:text-base"
                th:hx-get="@{/users/account/personal-info}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
              >
                <div class="flex items-center gap-2">
                  <i class="ri-user-line"></i>
                  <span class="hidden sm:inline">Informações Pessoais</span>
                  <span class="sm:hidden">Pessoal</span>
                </div>
              </button>
              <button
                id="tab-bookmarks"
                class="tab-button px-2 sm:px-6 py-3 font-medium text-gray-700 border-b-2 border-transparent hover:text-primary hover:border-gray-300 transition-colors whitespace-nowrap text-sm sm:text-base"
                th:hx-get="@{/users/bookmarked}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
              >
                <div class="flex items-center gap-2">
                  <i class="ri-bookmark-line"></i>
                  <span class="hidden sm:inline">Fotos Marcadas</span>
                  <span class="sm:hidden">Marcadas</span>
                </div>
              </button>
            </div>
          </div>

          <!-- Tab Content -->
          <div th:hx-get="@{/users/account/personal-info}" th:hx-trigger="load" id="tab-content"/>
            <!-- Conteúdo inicial carregado via HTMX -->
      </main>

      <!-- footer -->
      <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
  </html>
</DOCTYPE>
