<DOCTYPE html>
  <html xmlns:th="https://www.thymeleaf.org" lang="pt-br">
    <head th:insert="~{fragments/header}"></head>

    <style>
      :where([class^="ri-"])::before {
        content: "\f3c2";
      }
      body {
        font-family: "Poppins", sans-serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Montserrat", sans-serif;
      }
      .header-nav {
        transition: background-color 0.3s ease;
      }
      input:focus,
      button:focus {
        outline: none;
      }
      .form-container {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(255, 255, 255, 0.95) 100%
        );
        backdrop-filter: blur(10px);
      }
      .main-bg {
        background-image: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      }
      .success-message {
        background-color: #f0f9ff;
        border-color: #22c55e;
        color: #16a34a;
      }
      .error-message {
        background-color: #fef2f2;
        border-color: #ef4444;
        color: #dc2626;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <body class="bg-gray-100">
      <!-- Header -->
      <div th:insert="~{fragments/top :: top}"></div>

      <!-- Content -->
      <main th:fragment="main" class="main container mx-auto p-4 py-8">
        <div class="max-w-md w-full">
          <div class="form-container bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
              <div
                class="w-16 h-16 flex items-center justify-center bg-primary bg-opacity-10 rounded-full mx-auto mb-4"
              >
                <i class="ri-lock-unlock-line ri-2x text-primary"></i>
              </div>
              <h1 class="text-3xl font-bold text-gray-900 mb-2">
                Resetar a senha
              </h1>
              <p class="text-gray-600">
                Digite seu email que enviaremos as instruções para resetar sua
                senha.
              </p>
            </div>

            <div
              id="feedback-message"
              class="hidden mb-6 p-4 rounded-lg border fade-in"
            >
              <div class="flex items-center">
                <div class="w-5 h-5 flex items-center justify-center mr-3">
                  <i id="feedback-icon" class="ri-check-line"></i>
                </div>
                <p id="feedback-text" class="text-sm font-medium"></p>
              </div>
            </div>
            <div
              th:if="${email}"
              id="feedback-message"
              class="mb-6 p-4 rounded-lg border fade-in success-message"
            >
              <div class="flex items-center">
                <div class="w-5 h-5 flex items-center justify-center mr-3">
                  <i id="feedback-icon" class="ri-check-line"></i>
                </div>
                <p id="feedback-text" class="text-sm font-medium">
                  As instruções de resetar a sua senha foram enviados para o
                  email
                  <span class="font-bold" th:text="${email}"></span>. Por favor
                  verifique seu email e siga as instruções para reinciar a
                  senha.
                </p>
              </div>
            </div>
            <form
              id="reset-form"
              class="space-y-6"
              th:action="@{/login/password-reset}"
              method="post"
            >
              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-700 mb-2"
                  >Email</label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <div
                      class="w-5 h-5 flex items-center justify-center text-gray-400"
                    >
                      <i class="ri-mail-line"></i>
                    </div>
                  </div>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                    placeholder="Digite seu email"
                  />
                </div>
              </div>

              <button
                type="submit"
                id="submit-btn"
                class="w-full px-4 py-3 bg-primary text-white font-medium hover:bg-opacity-90 transition-colors !rounded-button whitespace-nowrap"
              >
                Enviar instruções
              </button>
            </form>

            <div class="mt-6 text-center">
              <p class="text-gray-600">
                Lembrou da senha?
                <a
                  href="/login"
                  class="text-primary font-medium hover:text-opacity-80 transition-colors"
                  >Logar</a
                >
              </p>
            </div>
          </div>
        </div>
      </main>

      <!-- footer -->
      <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
  </html>
</DOCTYPE>
